server:
  port: 8080
  max-http-request-header-size: 32KB

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false

spring:
  application:
    name: activecity-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    open-in-view: false

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
            required: ${MAIL_SMTP_STARTTLS:true}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.activecity.api.cm.entity,com.activecity.api.admin.dto,com.activecity.api.user.dto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

app:
  jwt:
    secret: ${JWT_SECRET}
    expiry-hours: ${JWT_EXPIRY_HOURS:8}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:3000}

logging:
  level:
    com.activecity: DEBUG
    org.mybatis: DEBUG
