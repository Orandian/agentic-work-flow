# =============================================================================
# compose.yml — ActiveCity Staff Portal
# Infrastructure-only: PostgreSQL + ChromaDB (for local dev)
# Full stack (production):  docker compose --profile app up --build
# Usage:
#   Local dev infra only:  docker compose up -d db chroma
#   Full stack:            docker compose --profile app up --build
# =============================================================================

networks:
  activecity-net:
    driver: bridge

volumes:
  postgres_data:
  chroma_data:

services:

  # ── PostgreSQL Database ──────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: activecity-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-activecity}
      POSTGRES_USER:     ${POSTGRES_USER:-activecity_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-activecity_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./activecity-api/src/main/resources/db/V1__init_auth_schema.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - activecity-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-activecity_user} -d ${POSTGRES_DB:-activecity}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB (Vector Store) ──────────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: activecity-chroma
    restart: unless-stopped
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "${CHROMA_HOST_PORT:-8001}:8000"
    networks:
      - activecity-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend (production profile only) ────────────────────────────
  backend:
    build:
      context: ./activecity-api
      dockerfile: Dockerfile
    container_name: activecity-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://db:5432/${POSTGRES_DB:-activecity}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-activecity_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-activecity_pass}
      JWT_SECRET:                 ${JWT_SECRET:-set-JWT_SECRET-in-.env-before-deploying}
      MAIL_HOST:                  ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT:                  ${MAIL_PORT:-587}
      MAIL_USERNAME:              ${MAIL_USERNAME:-noreply@example.com}
      MAIL_PASSWORD:              ${MAIL_PASSWORD:-}
      SPRING_PROFILES_ACTIVE:     docker
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - activecity-net
    profiles:
      - app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Next.js Frontend (production profile only) ───────────────────────────────
  frontend:
    build:
      context: ./activecity-web
      dockerfile: Dockerfile
    container_name: activecity-frontend
    restart: unless-stopped
    environment:
      API_BASE_URL: http://backend:8080
      NODE_ENV:     production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - activecity-net
    profiles:
      - app

  # ── FastAPI RAG / AI Search (production profile only) ───────────────────────
  ai-search:
    build:
      context: ./ai-search
      dockerfile: Dockerfile
    container_name: activecity-ai-search
    restart: unless-stopped
    environment:
      CHROMA_HOST:       chroma
      CHROMA_PORT:       "8000"
      DATABASE_URL:      postgresql://${POSTGRES_USER:-activecity_user}:${POSTGRES_PASSWORD:-activecity_pass}@db:5432/${POSTGRES_DB:-activecity}
      JWT_SECRET:        ${JWT_SECRET:?JWT_SECRET is required}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ALLOWED_ORIGINS:   ${ALLOWED_ORIGINS:-http://localhost:3000}
      APP_ENV:           production
    ports:
      - "${AI_SEARCH_PORT:-8000}:8000"
    depends_on:
      - chroma
      - db
    networks:
      - activecity-net
    profiles:
      - app

  # ── pgAdmin (optional — run with: docker compose --profile tools up) ─────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: activecity-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@activecity.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - db
    networks:
      - activecity-net
    profiles:
      - tools
